x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.3
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://traffic_user:traffic_pass_123@postgres:5432/traffic_analytics
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
    AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
  volumes:
    - ../airflow/dags:/opt/airflow/dags
    - ../airflow/logs:/opt/airflow/logs
    - ../airflow/plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - traffic-net

services:
  # ========================================
  # Zookeeper - Quản lý Kafka cluster
  # ========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - traffic-net

  # ========================================
  # Kafka - Message Broker
  # ========================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - traffic-net

  # ========================================
  # MinIO - Object Storage (S3-compatible)
  # ========================================
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - traffic-net

  # ========================================
  # MinIO Setup - Tạo bucket ban đầu
  # ========================================
  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      - minio
    entrypoint: /bin/sh
    command: /setup/minio_setup.sh
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - ./minio_setup.sh:/setup/minio_setup.sh
    networks:
      - traffic-net

  # ========================================
  # Elasticsearch - Tìm kiếm & Phân tích
  # ========================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - traffic-net

  # ========================================
  # Kibana - Visualization cho Elasticsearch
  # ========================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      - traffic-net

  # ========================================
  # PostgreSQL - Relational Database
  # ========================================
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: traffic_analytics
      POSTGRES_USER: traffic_user
      POSTGRES_PASSWORD: traffic_pass_123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic_user -d traffic_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - traffic-net

  # ========================================
  # Airflow Init - Khởi tạo metadata DB + user admin
  # ========================================
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        for i in {1..20}; do
          airflow db init && break
          echo "Waiting for metadata DB... attempt $${i}/20"
          sleep 3
        done
        airflow db check
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USERNAME}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email "$${AIRFLOW_ADMIN_EMAIL}" || true
    restart: "no"

  # ========================================
  # Airflow Webserver
  # ========================================
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - traffic-net

  # ========================================
  # Airflow Scheduler
  # ========================================
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - traffic-net

  # ========================================
  # Airflow Triggerer
  # ========================================
  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow-triggerer
    command: triggerer
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - traffic-net

  # ========================================
  # Flink JobManager
  # ========================================
  flink-jobmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    networks:
      - traffic-net

  # ========================================
  # Flink TaskManager
  # ========================================
  flink-taskmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    networks:
      - traffic-net

  # ========================================
  # Producer - TomTom -> Kafka raw
  # ========================================
  producer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streaming
    container_name: producer
    command: python src/producers/traffic_producer.py
    env_file:
      - ../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_TRAFFIC_RAW: traffic-raw
    volumes:
      - ../logs:/app/logs
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - traffic-net

  # ========================================
  # Ingestion - Kafka raw -> MinIO
  # ========================================
  ingestion:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streaming
    container_name: ingestion
    command: python src/ingestion/kafka_to_minio.py
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_TRAFFIC_RAW: traffic-raw
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET_RAW: traffic-raw-data
      MINIO_USE_SSL: "false"
    volumes:
      - ../logs:/app/logs
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_started
      minio-setup:
        condition: service_started
    restart: unless-stopped
    networks:
      - traffic-net

  # ========================================
  # Flink Speed Layer - Kafka raw -> Kafka processed
  # ========================================
  flink-speed-layer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streaming
    container_name: flink-speed-layer
    command: python src/streaming/flink_speed_layer.py
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_TRAFFIC_RAW: traffic-raw
      KAFKA_TOPIC_TRAFFIC_PROCESSED: traffic-processed
      KAFKA_GROUP_ID: flink-speed-layer-group
    volumes:
      - ../logs:/app/logs
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - traffic-net

  # ========================================
  # Elasticsearch Sink - Kafka processed -> ES
  # ========================================
  es-sink:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streaming
    container_name: es-sink
    command: python src/streaming/kafka_to_elasticsearch.py
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_TRAFFIC_PROCESSED: traffic-processed
      ES_HOST: elasticsearch
      ES_PORT: 9200
      ES_INDEX_TRAFFIC: traffic-realtime
    volumes:
      - ../logs:/app/logs
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      flink-speed-layer:
        condition: service_started
    restart: unless-stopped
    networks:
      - traffic-net

  # ========================================
  # Kibana Dashboard Setup (one-shot)
  # ========================================
  kibana-setup:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streaming
    container_name: kibana-setup
    command: python src/dashboard/setup_kibana_dashboard.py --kibana-url http://kibana:5601
    environment:
      KIBANA_URL: http://kibana:5601
    volumes:
      - ../logs:/app/logs
    depends_on:
      kibana:
        condition: service_started
      es-sink:
        condition: service_started
    restart: "no"
    networks:
      - traffic-net

volumes:
  minio-data:
  es-data:
  pg-data:

networks:
  traffic-net:
    driver: bridge
